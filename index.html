<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Tadeo y Nicolas</title>
    <style>
        /* Estilos básicos para que no sea "feo" */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        header {
            border-bottom: 2px solid #3498db;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 2rem;
        }

        .badge {
            background-color: #3498db;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 10px;
        }

        p {
            font-size: 1.1rem;
            margin: 20px 0;
        }

        footer {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Bienvenidos</h1>
            <span class="badge">Portafolio Escolar</span>
        </header>

        <main>
            <p>Somos <strong>Tadeo y Nicolas</strong>,<br> 
            estudiantes de la división <strong>3°H</strong>.</p>
        </main>

        <footer>
            © 2026 - Trabajo de Informática
        </footer>
    </div>

</body>
</html>
